<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stats – Recouvrement</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #F83131;
  --navy:   #064C72;
  --sky:    #8ECAE6;
  --green:  #1B5A43;
  --yellow: #FFC444;
  --peach:  #FFDBCC;
  --ice:    #D8ECFE;
  --bg:     #04212F;
  --surface:#07384F;
  --border: #0D536E;
  --text:   #F0F9FF;
  --muted:  #8ECAE6;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

/* ── NAV ── */
nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-size: 16px; font-weight: 800; color: var(--red); letter-spacing: -.2px; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tabs a {
  padding: 7px 11px; border-radius: 9px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: all .15s;
}
.nav-tabs a.active { background: var(--red); color: white; }
.nav-tabs a:hover:not(.active) { background: var(--border); color: var(--text); }
.btn-logout {
  background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.btn-logout:hover { color: var(--red); }

/* ── PAGE ── */
.page-header { padding: 16px 16px 10px; border-bottom: 1px solid var(--border); }
.page-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
.updated { font-size: 11px; color: var(--muted); opacity: .7; margin-top: 4px; }

/* ── KPI STRIP ── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  padding: 14px;
}
.kpi {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 12px; text-align: center;
}
.kpi-val { font-size: 24px; font-weight: 800; color: var(--yellow); }
.kpi-lbl { font-size: 10px; font-weight: 600; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 0 16px 8px;
}

/* ── TABLE ── */
.table-wrap { overflow-x: auto; padding: 0 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 560px; }
thead th {
  background: var(--surface); color: var(--muted); font-weight: 700;
  padding: 9px 10px; text-align: right;
  border-bottom: 2px solid var(--border); white-space: nowrap;
  font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
}
thead th:first-child { text-align: left; border-radius: 8px 0 0 0; }
thead th:last-child  { border-radius: 0 8px 0 0; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #062840; }
tbody td { padding: 10px 10px; text-align: right; vertical-align: middle; white-space: nowrap; }
tbody td:first-child { text-align: left; font-weight: 700; font-size: 13px; }

.rate-pill {
  display: inline-block; padding: 4px 9px; border-radius: 7px;
  font-size: 12px; font-weight: 800;
}
.rate-green  { background: #0D3B1E; color: #4ADE80; }
.rate-yellow { background: #3A2A00; color: var(--yellow); }
.rate-red    { background: #2D0A0A; color: var(--red); }

.pct-val { font-size: 12px; font-weight: 700; }
.pct-green  { color: #4ADE80; }
.pct-yellow { color: var(--yellow); }
.pct-red    { color: var(--red); }
.pct-muted  { color: var(--muted); }
.sub { display: block; font-size: 10px; color: var(--muted); font-weight: 500; margin-top: 2px; }

/* ── LOGS ── */
.logs-section { padding: 16px; }
.logs-section h3 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
.log-entry {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
}
.log-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--navy); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: var(--sky); flex-shrink: 0;
}
.log-info { flex: 1; min-width: 0; }
.log-name { font-size: 14px; font-weight: 700; }
.log-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
.log-ua   { font-size: 10px; color: var(--muted); opacity: .6; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── STATES ── */
.state-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 280px; gap: 14px; color: var(--muted); font-size: 14px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--sky);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Recouvrement</span>
  <div class="nav-tabs">
    <a href="operations.html">Liste</a>
    <a href="map.html">Carte</a>
    <a href="resultats.html" class="active">Stats</a>
  </div>
  <button class="btn-logout" onclick="logout()">Déco.</button>
</nav>

<div class="page-header">
  <h2>Résultats hebdomadaires</h2>
  <div class="updated" id="updated"></div>
</div>

<div id="main">
  <div class="state-center"><div class="spinner"></div><span>Chargement…</span></div>
</div>

<script>
const agent = JSON.parse(sessionStorage.getItem('wr_agent') || 'null');
if (!agent) location.href = 'index.html';
function logout() { sessionStorage.removeItem('wr_agent'); location.href = 'index.html'; }

const fmt  = n => n != null ? new Intl.NumberFormat('fr-FR').format(Math.round(n)) : '—';
const fmtM = n => n != null ? (n / 1e6).toFixed(1) + 'M' : '—';
const pct  = (a, b) => (b > 0 && a != null) ? Math.round(a / b * 100) : null;

function pctClass(p) {
  if (p === null) return 'pct-muted';
  if (p >= 90) return 'pct-green';
  if (p >= 70) return 'pct-yellow';
  return 'pct-red';
}
function rateClass(p) {
  if (p === null) return 'rate-yellow';
  if (p >= 90) return 'rate-green';
  if (p >= 70) return 'rate-yellow';
  return 'rate-red';
}
function fmtWeek(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmtTs(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' })
    + ' · ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

async function load() {
  const statsJson = await fetch('data/weekly_stats.json?_=' + Date.now()).then(r => r.json());

  document.getElementById('updated').textContent =
    'Mis à jour ' + new Date(statsJson.updated_at).toLocaleString('fr-FR');

  const data = statsJson.data || [];
  const totalVal  = data.reduce((s, r) => s + (r.valeur_totale || 0), 0);
  const totalRec  = data.reduce((s, r) => s + (r.montant_recouvre || 0), 0);
  const avgRate   = pct(totalRec, totalVal);

  // Build table rows
  const rows = data.map(r => {
    const val = r.valeur_totale || 0;
    const pA  = pct(r.montant_recouvre, val);
    const p0  = pct(r.recup_j0_cfa,  val);
    const p3  = pct(r.recup_j3_cfa,  val);
    const p7  = pct(r.recup_j7_cfa,  val);
    const p15 = pct(r.recup_j15_cfa, val);
    const p30 = pct(r.recup_j30_cfa, val);

    function cell(p, cfa) {
      const c = pctClass(p);
      return `<td><span class="pct-val ${c}">${p != null ? p+'%' : '—'}</span><span class="sub">${fmt(cfa)}</span></td>`;
    }
    return `<tr>
      <td>${fmtWeek(r.semaine)}</td>
      <td style="text-align:center">${r.nb_clients}</td>
      <td>${fmt(val)}</td>
      <td><span class="rate-pill ${rateClass(pA)}">${pA != null ? pA+'%' : '—'}</span><span class="sub">${fmt(r.montant_recouvre)}</span></td>
      ${cell(p0, r.recup_j0_cfa)}
      ${cell(p3, r.recup_j3_cfa)}
      ${cell(p7, r.recup_j7_cfa)}
      ${cell(p15, r.recup_j15_cfa)}
      ${cell(p30, r.recup_j30_cfa)}
    </tr>`;
  }).join('');

  // Logs depuis localStorage (par appareil)
  const logs = JSON.parse(localStorage.getItem('wr_login_log') || '[]');
  const logsHTML = logs.length
    ? logs.slice(0, 50).map(l => `
        <div class="log-entry">
          <div class="log-avatar">${initials(l.agent)}</div>
          <div class="log-info">
            <div class="log-name">${l.agent}</div>
            <div class="log-time">${fmtTs(l.ts)}</div>
            <div class="log-ua">${l.ua || ''}</div>
          </div>
        </div>`).join('')
    : '<div style="color:var(--muted);font-size:14px;padding:8px 0">Aucune connexion sur cet appareil.</div>';

  document.getElementById('main').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${data.length}</div><div class="kpi-lbl">Semaines</div></div>
      <div class="kpi"><div class="kpi-val">${avgRate != null ? avgRate+'%' : '—'}</div><div class="kpi-lbl">Taux moy.</div></div>
      <div class="kpi"><div class="kpi-val">${fmtM(totalVal)}</div><div class="kpi-lbl">FCFA suivi</div></div>
    </div>

    <div class="section-label">Recouvrement par semaine (12 dernières)</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Semaine</th>
            <th style="text-align:center">Clients</th>
            <th>Valeur</th>
            <th>À date</th>
            <th>J0</th><th>J3</th><th>J7</th><th>J15</th><th>J30</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>

    <div class="divider"></div>

    <div class="logs-section">
      <h3>📋 Logs de connexion</h3>
      ${logsHTML}
    </div>`;
}

load().catch(e => {
  document.getElementById('main').innerHTML =
    '<div class="state-center">⚠️ Erreur de chargement</div>';
  console.error(e);
});
</script>
<script src="feedback.js"></script>
</body>
</html>
