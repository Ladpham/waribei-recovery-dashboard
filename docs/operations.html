<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Opérations – Recouvrement</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #F83131;
  --navy:   #064C72;
  --sky:    #8ECAE6;
  --green:  #1B5A43;
  --yellow: #FFC444;
  --peach:  #FFDBCC;
  --ice:    #D8ECFE;
  --bg:     #04212F;
  --surface:#07384F;
  --border: #0D536E;
  --text:   #F0F9FF;
  --muted:  #8ECAE6;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.nav-brand { font-size: 16px; font-weight: 800; color: var(--red); letter-spacing: -.2px; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tabs a {
  padding: 7px 11px; border-radius: 9px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: all .15s;
}
.nav-tabs a.active { background: var(--red); color: white; }
.nav-tabs a:hover:not(.active) { background: var(--border); color: var(--text); }
.btn-logout {
  background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.btn-logout:hover { color: var(--red); }

/* ── HEADER ── */
.page-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.page-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
.header-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: var(--muted);
}
.chip b { color: var(--text); }
.chip.danger b { color: var(--red); }
.chip.warn b { color: var(--yellow); }
.updated { font-size: 11px; color: var(--muted); opacity: .7; margin-top: 6px; }

/* ── CARDS ── */
.list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
}
.card-top {
  display: flex; align-items: center; gap: 12px; padding: 14px 14px 10px;
}
.avatar {
  width: 54px; height: 54px; border-radius: 12px; flex-shrink: 0;
  background: var(--border); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--sky);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sup  { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.delay-tag {
  flex-shrink: 0; padding: 5px 10px; border-radius: 8px;
  font-size: 13px; font-weight: 800;
}
.delay-low  { background: #1A3A1A; color: #4ADE80; }
.delay-mid  { background: #3A2A00; color: var(--yellow); }
.delay-high { background: #2D0A0A; color: var(--red); }

.card-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.stat-cell {
  background: var(--surface); padding: 10px 14px;
}
.stat-cell:nth-child(3), .stat-cell:nth-child(4) { background: #062F42; }
.stat-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.stat-value { font-size: 14px; font-weight: 700; margin-top: 2px; }
.stat-value.cfa { color: var(--yellow); }

.card-actions { display: flex; gap: 8px; padding: 12px 14px; }
.btn-action {
  flex: 1; padding: 11px 8px; border-radius: 11px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; text-decoration: none; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: opacity .15s, transform .1s;
}
.btn-action:active { opacity: .8; transform: scale(.97); }
.btn-portal { background: var(--red);    color: white; }
.btn-gps    { background: var(--border); color: var(--text); }
.btn-gps.disabled { opacity: .35; cursor: not-allowed; }

/* ── STATES ── */
.state-center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 320px; gap: 14px; color: var(--muted); font-size: 14px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--sky);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Recouvrement</span>
  <div class="nav-tabs">
    <a href="operations.html" class="active">Liste</a>
    <a href="map.html">Carte</a>
    <a href="resultats.html">Stats</a>
  </div>
  <button class="btn-logout" onclick="logout()">Déco.</button>
</nav>

<div class="page-header">
  <h2>Clients PAR 8–30</h2>
  <div class="header-meta">
    <span class="chip"><b id="cnt">…</b>&nbsp;transactions</span>
    <span class="chip danger"><b id="total_cfa">…</b>&nbsp;FCFA</span>
  </div>
  <div class="updated" id="updated"></div>
</div>

<div id="list" class="list">
  <div class="state-center"><div class="spinner"></div><span>Chargement…</span></div>
</div>

<script>
const WARIPORTAIL_URL = txId => `https://wariportal.waribei.africa/transactions/${txId}`;
const fmt = n => new Intl.NumberFormat('fr-FR').format(Math.round(n || 0));

const agent = JSON.parse(sessionStorage.getItem('wr_agent') || 'null');
if (!agent) location.href = 'index.html';
function logout() { sessionStorage.removeItem('wr_agent'); location.href = 'index.html'; }

function delayClass(d) {
  if (d >= 22) return 'delay-high';
  if (d >= 15) return 'delay-mid';
  return 'delay-low';
}

function renderCard(tx) {
  const initials = (tx.merchant_name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const avatarHTML = tx.photo_url
    ? `<img src="${tx.photo_url}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='${initials}'">`
    : initials;

  const gpsHref = tx.latitude && tx.longitude
    ? `https://www.google.com/maps/dir/?api=1&destination=${tx.latitude},${tx.longitude}` : null;

  const dClass = delayClass(tx.jours_retard);

  return `<div class="card">
    <div class="card-top">
      <div class="avatar">${avatarHTML}</div>
      <div class="card-info">
        <div class="card-name">${tx.merchant_name || '—'}</div>
        <div class="card-sup">📦 ${tx.supplier_name || '—'}</div>
      </div>
      <div class="delay-tag ${dClass}">J+${tx.jours_retard}</div>
    </div>
    <div class="card-stats">
      <div class="stat-cell">
        <div class="stat-label">Montant</div>
        <div class="stat-value cfa">${fmt(tx.montant)}<small style="font-size:10px;font-weight:500;margin-left:3px">FCFA</small></div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Tx historique</div>
        <div class="stat-value">${tx.nb_tx_historique} tx</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Zone</div>
        <div class="stat-value" style="font-size:12px">${tx.district || (tx.latitude ? '📍 GPS dispo' : '—')}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Échéance</div>
        <div class="stat-value" style="font-size:12px">${tx.maturity_date || '—'}</div>
      </div>
    </div>
    <div class="card-actions">
      <a href="${WARIPORTAIL_URL(tx.tx_id)}" target="_blank" class="btn-action btn-portal">🔗 Wariportail</a>
      ${gpsHref
        ? `<a href="${gpsHref}" target="_blank" class="btn-action btn-gps">🗺️ Y aller</a>`
        : `<span class="btn-action btn-gps disabled">Pas de GPS</span>`}
    </div>
  </div>`;
}

async function load() {
  const json = await fetch('data/transactions.json?_=' + Date.now()).then(r => r.json());
  const data = json.data || [];

  document.getElementById('cnt').textContent = data.length;
  document.getElementById('total_cfa').textContent =
    fmt(data.reduce((s, t) => s + (t.montant || 0), 0));
  document.getElementById('updated').textContent =
    'Mis à jour ' + new Date(json.updated_at).toLocaleString('fr-FR');

  const list = document.getElementById('list');
  list.innerHTML = data.length
    ? data.map(renderCard).join('')
    : '<div class="state-center">✅ Aucune transaction PAR 8–30</div>';
}

load().catch(() => {
  document.getElementById('list').innerHTML =
    '<div class="state-center">⚠️ Erreur de chargement</div>';
});
</script>
<script src="feedback.js"></script>
</body>
</html>
