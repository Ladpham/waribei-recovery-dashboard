<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Carte – Recouvrement</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:    #F83131;
  --sky:    #8ECAE6;
  --yellow: #FFC444;
  --bg:     #04212F;
  --surface:#07384F;
  --border: #0D536E;
  --text:   #F0F9FF;
  --muted:  #8ECAE6;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px; flex-shrink: 0;
}
.nav-brand { font-size: 16px; font-weight: 800; color: var(--red); letter-spacing: -.2px; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tabs a {
  padding: 7px 11px; border-radius: 9px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: all .15s;
}
.nav-tabs a.active { background: var(--red); color: white; }
.nav-tabs a:hover:not(.active) { background: var(--border); color: var(--text); }
.btn-logout {
  background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.btn-logout:hover { color: var(--red); }

#map { flex: 1; }

/* Popup */
.leaflet-popup-content-wrapper {
  background: var(--surface) !important; border: 1px solid var(--border) !important;
  border-radius: 14px !important; color: var(--text) !important;
  box-shadow: 0 12px 40px rgba(0,0,0,.5) !important;
  font-family: 'DM Sans', sans-serif !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 14px 16px !important; }
.pu-name { font-size: 15px; font-weight: 800; margin-bottom: 8px; }
.pu-row  { font-size: 12px; color: var(--muted); margin-top: 4px; }
.pu-row b { color: var(--text); }
.pu-amount { font-size: 18px; font-weight: 800; color: var(--yellow); margin: 8px 0 4px; }
.pu-delay  { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
.pu-actions { display: flex; gap: 8px; margin-top: 10px; }
.pu-btn {
  flex: 1; padding: 9px 6px; border-radius: 9px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; text-decoration: none; text-align: center; display: block;
}
.pu-btn-nav  { background: var(--red);    color: white; }
.pu-btn-port { background: var(--border); color: var(--text); }

/* Legend */
.legend {
  position: absolute; bottom: 20px; left: 12px; z-index: 999;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px; font-size: 12px; color: var(--muted);
  font-family: 'DM Sans', sans-serif;
}
.legend b { color: var(--text); display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
.leg-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
.dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Recouvrement</span>
  <div class="nav-tabs">
    <a href="operations.html">Liste</a>
    <a href="map.html" class="active">Carte</a>
    <a href="promesses.html">Promesses</a>
    <a href="resultats.html">Stats</a>
  </div>
  <button class="btn-logout" onclick="logout()">Déco.</button>
</nav>

<div id="map"></div>

<div class="legend">
  <b>Retard</b>
  <div class="leg-row"><div class="dot" style="background:#4ADE80"></div> 8–14 j</div>
  <div class="leg-row"><div class="dot" style="background:#FFC444"></div> 15–21 j</div>
  <div class="leg-row"><div class="dot" style="background:#F83131"></div> 22–30 j</div>
</div>

<script>
const WARIPORTAIL_URL = txId => `https://wariportal.waribei.africa/transactions/${txId}`;
const fmt = n => new Intl.NumberFormat('fr-FR').format(Math.round(n || 0));

const agent = JSON.parse(sessionStorage.getItem('wr_agent') || 'null');
if (!agent) location.href = 'index.html';
function logout() { sessionStorage.removeItem('wr_agent'); location.href = 'index.html'; }

function pinColor(d) {
  if (d >= 22) return '#F83131';
  if (d >= 15) return '#FFC444';
  return '#4ADE80';
}
function delayClass(d) {
  if (d >= 22) return 'background:#2D0A0A;color:#F83131';
  if (d >= 15) return 'background:#3A2A00;color:#FFC444';
  return 'background:#1A3A1A;color:#4ADE80';
}

function markerIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;border-radius:50%;background:${color};border:2.5px solid white;box-shadow:0 2px 10px rgba(0,0,0,.5)"></div>`,
    iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18],
  });
}

const map = L.map('map', { zoomControl: true }).setView([5.345, -4.024], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19,
}).addTo(map);

async function load() {
  const json = await fetch('data/transactions.json?_=' + Date.now()).then(r => r.json());
  const data = (json.data || []).filter(t => t.latitude && t.longitude);
  const bounds = [];

  for (const tx of data) {
    const color = pinColor(tx.jours_retard);
    const gpsHref = `https://www.google.com/maps/dir/?api=1&destination=${tx.latitude},${tx.longitude}`;
    const dStyle = delayClass(tx.jours_retard);

    const popup = `
      <div class="pu-name">${tx.merchant_name || '—'}</div>
      <div class="pu-row">📦 <b>${tx.supplier_name || '—'}</b></div>
      <div class="pu-row">📍 ${tx.district || '—'}</div>
      <div class="pu-row">🔄 <b>${tx.nb_tx_historique}</b> tx historique</div>
      <div class="pu-amount">${fmt(tx.montant)} FCFA</div>
      <span class="pu-delay" style="${dStyle}">J+${tx.jours_retard}</span>
      <div class="pu-actions">
        <a href="${gpsHref}" target="_blank" class="pu-btn pu-btn-nav">🗺️ Y aller</a>
        <a href="${WARIPORTAIL_URL(tx.tx_id)}" target="_blank" class="pu-btn pu-btn-port">🔗 Portail</a>
      </div>`;

    L.marker([tx.latitude, tx.longitude], { icon: markerIcon(color) })
      .bindPopup(popup, { maxWidth: 240 }).addTo(map);
    bounds.push([tx.latitude, tx.longitude]);
  }
  if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
}

load().catch(console.error);
</script>
<script src="feedback.js"></script>
</body>
</html>
