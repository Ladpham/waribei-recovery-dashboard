<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Waribei Recouvrement</title>
<script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 { color: #f59e0b; font-size: 24px; font-weight: 700; }
  .logo p  { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 14px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #f1f5f9;
    font-size: 16px;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #f59e0b; }
  .btn {
    width: 100%;
    padding: 14px;
    background: #f59e0b;
    color: #0f172a;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    background: #450a0a;
    border: 1px solid #991b1b;
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #0f172a;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Waribei Recouvrement</h1>
    <p>Dashboard agents</p>
  </div>
  <div class="field">
    <label>Identifiant</label>
    <input id="username" type="text" placeholder="alassane ou francisAka" autocomplete="username">
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="login()">Se connecter</button>
  <div class="error" id="err"></div>
</div>

<script>
async function login() {
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  err.style.display = 'none';
  if (!username || !password) {
    showErr('Remplis tous les champs.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Vérification…';

  try {
    const res = await fetch('data/config.json?_=' + Date.now());
    const cfg = await res.json();
    const agent = cfg.agents.find(a => a.username === username);
    if (!agent) { showErr('Identifiant inconnu.'); return; }

    const ok = await bcrypt.compare(password, agent.hash);
    if (!ok) { showErr('Mot de passe incorrect.'); return; }

    sessionStorage.setItem('wr_agent', JSON.stringify({ id: agent.id, display: agent.display }));
    window.location.href = 'operations.html';
  } catch(e) {
    showErr('Erreur réseau. Réessaie.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Se connecter';
  }
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').innerHTML = 'Se connecter';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// Already logged in?
if (sessionStorage.getItem('wr_agent')) {
  window.location.href = 'operations.html';
}
</script>
</body>
</html>
