<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Résultats – Recouvrement</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#F83131; --navy:#064C72; --sky:#8ECAE6; --green:#1B5A43;
  --yellow:#FFC444; --bg:#04212F; --surface:#07384F; --border:#0D536E;
  --text:#F0F9FF; --muted:#8ECAE6;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:56px; position:sticky; top:0; z-index:100;
}
.nav-brand { font-size:16px; font-weight:800; color:var(--red); }
.nav-tabs { display:flex; gap:2px; }
.nav-tabs a {
  padding:7px 11px; border-radius:9px; font-size:13px; font-weight:600;
  color:var(--muted); text-decoration:none; transition:all .15s;
}
.nav-tabs a.active { background:var(--red); color:white; }
.nav-tabs a:hover:not(.active) { background:var(--border); color:var(--text); }
.btn-logout { background:none; border:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; }
.btn-logout:hover { color:var(--red); }

.page-header { padding:16px 16px 4px; }
.page-header h2 { font-size:20px; font-weight:800; }
.updated { font-size:11px; color:var(--muted); opacity:.7; margin-top:4px; }

.kpi-strip { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 14px 4px; }
.kpi-cell {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px;
}
.kpi-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.kpi-val   { font-size:22px; font-weight:800; margin-top:6px; }
.kpi-sub   { font-size:11px; color:var(--muted); margin-top:2px; }

.section-title {
  padding:14px 16px 8px;
  font-size:12px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.08em;
}
.weeks { padding:0 12px 24px; display:flex; flex-direction:column; gap:10px; }

.week-card {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  overflow:hidden;
}
.week-card-header { display:flex; align-items:center; gap:12px; padding:14px 16px 12px; }
.week-label { flex:1; }
.week-label-main { font-size:14px; font-weight:700; }
.week-label-sub  { font-size:12px; color:var(--muted); margin-top:1px; }
.week-badge {
  padding:6px 12px; border-radius:10px; font-size:18px; font-weight:900;
  min-width:60px; text-align:center;
}
.week-badge.excellent { background:#0D2B1A; color:#4ADE80; }
.week-badge.good      { background:#1A2E0A; color:#86EFAC; }
.week-badge.mid       { background:#2A200A; color:var(--yellow); }
.week-badge.low       { background:#2A0F0A; color:#F87171; }

.week-bar-wrap { margin:0 16px 12px; background:rgba(255,255,255,.06); border-radius:6px; height:8px; overflow:hidden; }
.week-bar      { height:100%; border-radius:6px; }
.bar-excellent { background:#4ADE80; }
.bar-good      { background:#86EFAC; }
.bar-mid       { background:var(--yellow); }
.bar-low       { background:#F87171; }

.week-nums { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); border-top:1px solid var(--border); }
.wn-cell { background:var(--surface); padding:9px 12px; }
.wn-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.wn-val   { font-size:13px; font-weight:700; margin-top:2px; }

.logs-section { padding:0 12px 80px; }
.logs-title { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; padding:10px 4px 8px; }
.log-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:var(--surface);
  border:1px solid var(--border); border-radius:11px;
  margin-bottom:6px;
}
.log-avatar {
  width:32px; height:32px; border-radius:8px; background:var(--navy);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:800; color:var(--sky); flex-shrink:0;
}
.log-name { font-size:13px; font-weight:600; }
.log-time { font-size:11px; color:var(--muted); }
.log-device { font-size:11px; color:var(--muted); }
.no-logs  { color:var(--muted); font-size:13px; text-align:center; padding:20px 0; }

.state-center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:12px; color:var(--muted); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--sky); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Recouvrement</span>
  <div class="nav-tabs">
    <a href="operations.html">Liste</a>
    <a href="map.html">Carte</a>
    <a href="resultats.html" class="active">Stats</a>
  </div>
  <button class="btn-logout" onclick="logout()">Déco.</button>
</nav>

<div class="page-header">
  <h2>Résultats</h2>
  <div class="updated" id="updated"></div>
</div>

<div id="kpi-strip" class="kpi-strip" style="display:none">
  <div class="kpi-cell">
    <div class="kpi-label">Taux moyen</div>
    <div class="kpi-val" id="kpi-rate">—</div>
    <div class="kpi-sub">récupéré (12 sem.)</div>
  </div>
  <div class="kpi-cell">
    <div class="kpi-label">FCFA suivi</div>
    <div class="kpi-val" id="kpi-fcfa" style="font-size:16px">—</div>
    <div class="kpi-sub">entrés PAR 8</div>
  </div>
</div>

<div class="section-title">12 dernières semaines</div>
<div id="weeks" class="weeks">
  <div class="state-center"><div class="spinner"></div><span>Chargement…</span></div>
</div>

<div class="logs-section">
  <div class="logs-title">Connexions récentes</div>
  <div id="logs"></div>
</div>

<script>
const agent = JSON.parse(sessionStorage.getItem('wr_agent') || 'null');
if (!agent) location.href = 'index.html';
function logout() { sessionStorage.removeItem('wr_agent'); location.href = 'index.html'; }

const fmtM = n => {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'k';
  return String(Math.round(n));
};

function getISOWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function fmtWeek(s) {
  if (!s) return '—';
  const d = new Date(s);
  const week = getISOWeek(d);
  return `Semaine ${week}`;
}

function fmtWeekSub(s, nbClients, valeur) {
  if (!s) return '';
  const d = new Date(s);
  const dateStr = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long' });
  return `${dateStr} · ${nbClients} client${nbClients > 1 ? 's' : ''} · ${fmtM(valeur)} FCFA`;
}

function rateClass(pct) {
  if (pct >= 80) return 'excellent';
  if (pct >= 60) return 'good';
  if (pct >= 40) return 'mid';
  return 'low';
}

function renderWeeks(data) {
  if (!data.length) {
    document.getElementById('weeks').innerHTML = '<div class="state-center" style="min-height:100px">Aucune donnée</div>';
    return;
  }

  const totVal   = data.reduce((s, w) => s + (w.valeur_totale || 0), 0);
  const totRecup = data.reduce((s, w) => s + (w.montant_recouvre || 0), 0);
  const avgRate  = totVal > 0 ? Math.round((totRecup / totVal) * 100) : 0;

  document.getElementById('kpi-rate').textContent  = avgRate + '%';
  document.getElementById('kpi-fcfa').textContent  = fmtM(totVal) + ' FCFA';
  document.getElementById('kpi-strip').style.display = 'grid';

  document.getElementById('weeks').innerHTML = data.map(w => {
    const pct = w.valeur_totale > 0
      ? Math.round(((w.montant_recouvre || 0) / w.valeur_totale) * 100) : 0;
    const cls = rateClass(pct);
    const reste = (w.valeur_totale || 0) - (w.montant_recouvre || 0);

    const lettres  = w.nb_lettres || 0;
    const visites  = w.nb_visites || 0;
    const contactes = w.nb_clients_contactes || 0;

    return `<div class="week-card">
      <div class="week-card-header">
        <div class="week-label">
          <div class="week-label-main">${fmtWeek(w.semaine)}</div>
          <div class="week-label-sub">${fmtWeekSub(w.semaine, w.nb_clients, w.valeur_totale)}</div>
        </div>
        <div class="week-badge ${cls}">${pct}%</div>
      </div>
      <div class="week-bar-wrap">
        <div class="week-bar bar-${cls}" style="width:${pct}%"></div>
      </div>
      <div class="week-nums">
        <div class="wn-cell">
          <div class="wn-label">Récupéré</div>
          <div class="wn-val" style="color:#4ADE80">${fmtM(w.montant_recouvre)} <span style="font-size:10px;opacity:.7">/ ${fmtM(w.valeur_totale)}</span></div>
        </div>
        <div class="wn-cell">
          <div class="wn-label">Soldés</div>
          <div class="wn-val">${w.nb_solds || 0} / ${w.nb_clients}</div>
        </div>
        <div class="wn-cell">
          <div class="wn-label">Terrain</div>
          <div class="wn-val" style="color:var(--sky)">
            ${contactes}/${w.nb_clients} contactés
          </div>
        </div>
      </div>
      <div style="padding:8px 12px 10px; border-top:1px solid var(--border); display:flex; gap:12px; font-size:12px; color:var(--muted)">
        <span>📋 <b style="color:var(--text)">${lettres}</b> lettre${lettres > 1 ? 's' : ''} déposée${lettres > 1 ? 's' : ''}</span>
        <span>🚶 <b style="color:var(--text)">${visites}</b> visite${visites > 1 ? 's' : ''}</span>
      </div>
    </div>`;
  }).join('');
}

function renderLogs() {
  const logs = JSON.parse(localStorage.getItem('wr_login_log') || '[]');
  const el = document.getElementById('logs');
  if (!logs.length) {
    el.innerHTML = '<div class="no-logs">Aucune connexion enregistrée sur cet appareil</div>';
    return;
  }
  el.innerHTML = logs.slice(0, 15).map(l => {
    const initials = (l.agent || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const ts = new Date(l.ts);
    const dateStr = ts.toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' });
    const timeStr = ts.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="log-item">
      <div class="log-avatar">${initials}</div>
      <div style="flex:1">
        <div class="log-name">${l.agent || '—'}</div>
        <div class="log-time">${dateStr} à ${timeStr}</div>
      </div>
      <div class="log-device">${l.ua || ''}</div>
    </div>`;
  }).join('');
}

async function load() {
  const json = await fetch('data/weekly_stats.json?_=' + Date.now()).then(r => r.json());
  document.getElementById('updated').textContent = 'Mis à jour ' + new Date(json.updated_at).toLocaleString('fr-FR');
  renderWeeks(json.data || []);
  renderLogs();
}

load().catch(() => {
  document.getElementById('weeks').innerHTML = '<div class="state-center">⚠️ Erreur de chargement</div>';
});
</script>
<script src="feedback.js"></script>
</body>
</html>
