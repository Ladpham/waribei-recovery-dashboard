<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Résultats – Recouvrement</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #94a3b8; --accent: #f59e0b; --red: #ef4444; --green: #22c55e; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

nav {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; position: sticky; top: 0; z-index: 100;
}
.nav-title { font-size: 15px; font-weight: 700; color: var(--accent); }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: all .15s;
}
.nav-links a.active, .nav-links a:hover { background: var(--accent); color: #0f172a; }
.logout { color: var(--muted); font-size: 12px; cursor: pointer; background: none; border: none; padding: 0; }
.logout:hover { color: var(--red); }

.header { padding: 16px; border-bottom: 1px solid var(--border); }
.header h2 { font-size: 18px; }
.refresh-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── KPI STRIP ── */
.kpi-strip {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  padding: 14px;
}
.kpi {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 12px; text-align: center;
}
.kpi-val { font-size: 22px; font-weight: 800; color: var(--accent); }
.kpi-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

/* ── TABLE CONTAINER ── */
.table-wrap {
  overflow-x: auto;
  padding: 0 14px 80px;
}
.section-title {
  font-size: 13px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  margin: 16px 0 10px;
}

table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  min-width: 540px;
}
thead th {
  background: var(--surface); color: var(--muted);
  padding: 8px 10px; text-align: right; font-weight: 600;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
thead th:first-child { text-align: left; }
tbody tr { border-bottom: 1px solid var(--border); }
tbody tr:hover { background: #1e293b88; }
tbody td {
  padding: 10px 10px; text-align: right; vertical-align: middle;
  white-space: nowrap;
}
tbody td:first-child { text-align: left; font-weight: 600; }

.pill {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 700;
}
.pill-green { background: #14532d; color: var(--green); }
.pill-yellow { background: #422006; color: #fbbf24; }
.pill-red { background: #450a0a; color: var(--red); }

.pct { color: var(--muted); font-size: 11px; }
.pct.good { color: var(--green); }
.pct.mid  { color: #fbbf24; }
.pct.bad  { color: var(--red); }

.center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 12px; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <span class="nav-title">Recouvrement</span>
  <div class="nav-links">
    <a href="operations.html">Liste</a>
    <a href="map.html">Carte</a>
    <a href="resultats.html" class="active">Résultats</a>
  </div>
  <button class="logout" onclick="logout()">Déco.</button>
</nav>

<div class="header">
  <h2>Résultats hebdomadaires</h2>
  <div class="refresh-time" id="refresh_time"></div>
</div>

<div id="kpi-strip" class="kpi-strip" style="display:none">
  <div class="kpi"><div class="kpi-val" id="k_cohorts">—</div><div class="kpi-lbl">Semaines</div></div>
  <div class="kpi"><div class="kpi-val" id="k_rate">—</div><div class="kpi-lbl">Taux moy.</div></div>
  <div class="kpi"><div class="kpi-val" id="k_volume">—</div><div class="kpi-lbl">FCFA suivi</div></div>
</div>

<div class="table-wrap">
  <div id="loader" class="center"><div class="spinner"></div><span>Chargement…</span></div>
  <div id="content" style="display:none">
    <div class="section-title">Recouvrement par semaine (12 dernières)</div>
    <table>
      <thead>
        <tr>
          <th>Semaine</th>
          <th>Clients</th>
          <th>Valeur</th>
          <th>Recup. à date</th>
          <th>J0</th>
          <th>J3</th>
          <th>J7</th>
          <th>J15</th>
          <th>J30</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const agent = JSON.parse(sessionStorage.getItem('wr_agent') || 'null');
if (!agent) { window.location.href = 'index.html'; }
function logout() { sessionStorage.removeItem('wr_agent'); window.location.href = 'index.html'; }

const fmt    = n  => n != null ? new Intl.NumberFormat('fr-FR').format(Math.round(n)) : '—';
const fmtM   = n  => n != null ? (n / 1e6).toFixed(1) + 'M' : '—';
const pct    = (a, b) => (b && b > 0) ? Math.round((a || 0) / b * 100) : null;

function pctPill(p) {
  if (p === null) return '<span class="pct">—</span>';
  const cls = p >= 90 ? 'good' : p >= 70 ? 'mid' : 'bad';
  return `<span class="pct ${cls}">${p}%</span>`;
}

function fmtWeek(isoDate) {
  if (!isoDate) return '—';
  const d = new Date(isoDate);
  const day   = d.getDate().toString().padStart(2, '0');
  const month = d.toLocaleString('fr-FR', { month: 'short' });
  const year  = d.getFullYear();
  return `${day} ${month} ${year}`;
}

async function load() {
  const res  = await fetch('data/weekly_stats.json?_=' + Date.now());
  const json = await res.json();
  const data = json.data || [];

  document.getElementById('loader').style.display = 'none';
  document.getElementById('refresh_time').textContent =
    'Mis à jour ' + new Date(json.updated_at).toLocaleString('fr-FR');

  if (!data.length) {
    document.getElementById('content').innerHTML =
      '<div class="center">Pas encore de données</div>';
    document.getElementById('content').style.display = 'block';
    return;
  }

  // KPIs
  const totalVal  = data.reduce((s, r) => s + (r.valeur_totale || 0), 0);
  const totalRecup = data.reduce((s, r) => s + (r.montant_recouvre || 0), 0);
  const avgRate = pct(totalRecup, totalVal);
  document.getElementById('k_cohorts').textContent = data.length;
  document.getElementById('k_rate').textContent    = avgRate != null ? avgRate + '%' : '—';
  document.getElementById('k_volume').textContent  = fmtM(totalVal);
  document.getElementById('kpi-strip').style.display = 'grid';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = data.map(r => {
    const val  = r.valeur_totale || 0;
    const rec  = r.montant_recouvre || 0;
    const pA   = pct(rec, val);
    const p0   = pct(r.recup_j0_cfa, val);
    const p3   = pct(r.recup_j3_cfa, val);
    const p7   = pct(r.recup_j7_cfa, val);
    const p15  = pct(r.recup_j15_cfa, val);
    const p30  = pct(r.recup_j30_cfa, val);

    // pill color for recovery rate
    const rateClass = pA >= 90 ? 'pill-green' : pA >= 70 ? 'pill-yellow' : 'pill-red';

    return `<tr>
      <td>${fmtWeek(r.semaine)}</td>
      <td style="text-align:center">${r.nb_clients || 0}</td>
      <td>${fmt(val)}</td>
      <td><span class="pill ${rateClass}">${pA != null ? pA + '%' : '—'}</span><br><small style="color:var(--muted)">${fmt(rec)}</small></td>
      <td>${pctPill(p0)}<br><small style="color:var(--muted)">${fmt(r.recup_j0_cfa)}</small></td>
      <td>${pctPill(p3)}<br><small style="color:var(--muted)">${fmt(r.recup_j3_cfa)}</small></td>
      <td>${pctPill(p7)}<br><small style="color:var(--muted)">${fmt(r.recup_j7_cfa)}</small></td>
      <td>${pctPill(p15)}<br><small style="color:var(--muted)">${fmt(r.recup_j15_cfa)}</small></td>
      <td>${pctPill(p30)}<br><small style="color:var(--muted)">${fmt(r.recup_j30_cfa)}</small></td>
    </tr>`;
  }).join('');

  document.getElementById('content').style.display = 'block';
}

load().catch(e => {
  document.getElementById('loader').innerHTML = '<div class="center">⚠️ Erreur de chargement</div>';
  console.error(e);
});
</script>
</body>
</html>
